# Use sparse index for faster resolution.
[registries.crates-io]
protocol = "sparse"

[alias]
ci-fmt = "fmt --all -- --check"
ci-clippy = "clippy --workspace --all-targets --all-features --locked -- -D warnings"
ci-dylint = "dylint --workspace --all"
# nextest runs each test in its own process (a panic in one test cannot poison
# the run) and is faster than the built-in harness. It does NOT run doctests,
# so `ci-test-doc` covers those separately; keep both wired in `rust:test`.
ci-test = "nextest run --workspace --all-features --locked --cargo-profile ci"
ci-test-doc = "test --workspace --all-features --locked --doc --profile ci"
