name: Release

on:
  workflow_dispatch:
    inputs:
      publish_to_npm:
        description: Publish the current package versions to npm after verification
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Verify package tarballs
        shell: bash
        run: |
          set -euo pipefail

          check_packlist() {
            local package_dir="$1"
            shift
            local expected_files=("$@")
            local pack_json
            pack_json="$(cd "$package_dir" && npm pack --dry-run --json)"

            EXPECTED_FILES="$(printf '%s\n' "${expected_files[@]}")" \
            PACKAGE_DIR="$package_dir" \
            PACK_JSON="$pack_json" \
            node --input-type=module <<'EOF'
import process from "node:process";

const pack = JSON.parse(process.env.PACK_JSON ?? "[]")[0];
if (!pack) {
  console.error(`No pack metadata returned for ${process.env.PACKAGE_DIR}`);
  process.exit(1);
}

const files = new Set(pack.files.map((entry) => entry.path));
const expected = (process.env.EXPECTED_FILES ?? "")
  .split("\n")
  .filter(Boolean);
const missing = expected.filter((file) => !files.has(file));

if (missing.length > 0) {
  console.error(
    `${process.env.PACKAGE_DIR}: missing pack files: ${missing.join(", ")}`,
  );
  process.exit(1);
}
EOF
          }

          check_packlist packages/anonymize \
            dist/index.d.mts \
            dist/index.mjs \
            README.md \
            LICENSE \
            package.json

          check_packlist packages/data \
            dist/index.d.ts \
            dist/index.js \
            README.md \
            LICENSE \
            ATTRIBUTION.md \
            CHANGELOG.md \
            package.json \
            config/manifest.json \
            dictionaries/names/global.json \
            dictionaries/names/first/cs.json \
            dictionaries/names/surnames/cs.json \
            dictionaries/cities/CZ.json \
            dictionaries/banks/US.json \
            dictionaries/courts/US.json \
            dictionaries/insurance/CZ.json \
            dictionaries/education/universities-CZ.json \
            dictionaries/government/ministries-CZ.json \
            dictionaries/healthcare/hospitals-CZ.json \
            dictionaries/international/eu-institutions.json

          check_packlist packages/anonymize/wasm \
            dist/wasm.d.mts \
            dist/wasm.mjs \
            dist/vite.d.mts \
            dist/vite.mjs \
            README.md \
            LICENSE \
            package.json

  publish:
    needs: verify
    if: inputs.publish_to_npm == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/anonymize
          - packages/data
          - packages/anonymize/wasm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish package
        working-directory: ${{ matrix.package }}
        run: npm publish --provenance --access restricted
