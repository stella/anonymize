name: Release

env:
  BUN_VERSION: "1.3.13"
  NPM_VERSION: "11.11.1"

on:
  push:
    branches: [main]
    paths: [VERSION]
  workflow_dispatch:
    inputs:
      publish_to_npm:
        description: Publish the current package versions to npm after verification
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync runtime package versions
        run: bun run sync:version

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Verify package tarballs
        run: node .github/tools/check-packlist.mjs

  publish:
    needs: verify
    if: github.event_name == 'push' || inputs.publish_to_npm == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/anonymize
          - packages/data
          - packages/anonymize/wasm
          - packages/cli
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Install npm for trusted publishing
        run: npm install --global "npm@${{ env.NPM_VERSION }}"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync runtime package versions
        run: bun run sync:version

      - name: Build
        run: bun run build

      - name: Read package metadata
        id: package
        working-directory: ${{ matrix.package }}
        run: |
          package_name="$(node -p "require('./package.json').name")"
          artifact_name="$(
            node -e '
              const name = require("./package.json").name;
              console.log(`npm-tarball-${name.replace(/^@/, "").replace(/[\\/]/g, "-")}`);
            '
          )"

          echo "name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"

      - name: Pack package
        if: github.event_name != 'push' || matrix.package != 'packages/data'
        id: pack
        working-directory: ${{ matrix.package }}
        run: |
          set -euo pipefail
          pack_dir="$RUNNER_TEMP/npm-tarballs"
          mkdir -p "$pack_dir"

          pack_json="$(npm pack --json --ignore-scripts --pack-destination "$pack_dir")"
          filename="$(
            node -e '
              const pack = JSON.parse(process.argv[1]);
              console.log(pack[0].filename);
            ' "$pack_json"
          )"

          echo "tarball=${pack_dir}/${filename}" >> "$GITHUB_OUTPUT"

      - name: Upload package tarball
        if: github.event_name != 'push' || matrix.package != 'packages/data'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error

      - name: Publish package
        if: github.event_name != 'push' || matrix.package != 'packages/data'
        uses: stella/.github/.github/actions/npm-publish-hardened@4292546b5b6e5bd8660bd727913b4038644c3d0b
        with:
          tarball: ${{ steps.pack.outputs.tarball }}

  github-release:
    name: Create GitHub release
    needs: [verify, publish]
    if: needs.verify.result == 'success' && needs.publish.result == 'success' && (github.event_name == 'push' || inputs.publish_to_npm == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: npm-tarball-*
          path: release-artifacts
          merge-multiple: true

      - name: Read and validate VERSION
        id: version
        run: |
          if [[ ! -f VERSION ]]; then
            echo "::error::VERSION file is missing"
            exit 1
          fi

          version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(rc|beta|alpha)\.[0-9]+)?$ ]]; then
            echo "::error::VERSION must look like 1.2.3, 1.2.3-rc.1, 1.2.3-beta.1, or 1.2.3-alpha.1; got '$version'"
            exit 1
          fi

          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Create tag if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch --force --tags origin

          # /git/ref/{ref} is the exact-match endpoint. The plural
          # /git/refs/{ref} does prefix matching, so checking for
          # `v1.2.0` could also match `v1.2.0-rc.1`.
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Resolve release notes range
        id: release-notes-range
        env:
          RELEASE_REF: ${{ steps.version.outputs.tag }}
        run: |
          if [[ "$RELEASE_REF" == *-* ]]; then
            echo "args=--latest --strip header" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous_stable="$(
            git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
              --merged "$RELEASE_REF" \
              --sort=-v:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | grep -v -x "$RELEASE_REF" \
              | head -n 1
          )"

          if [[ -z "$previous_stable" ]]; then
            first_commit="$(git rev-list --max-parents=0 "$RELEASE_REF" | tail -n 1)"
            echo "args=--tag ${RELEASE_REF} --strip header ${first_commit}..${RELEASE_REF}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "args=--tag ${RELEASE_REF} --strip header ${previous_stable}..${RELEASE_REF}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from Conventional Commits
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: ${{ steps.release-notes-range.outputs.args }}
        env:
          OUTPUT: NOTES.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REF: ${{ steps.version.outputs.tag }}
        run: |
          mapfile -t assets < <(find release-artifacts -maxdepth 1 -type f -name '*.tgz' | sort)
          if ((${#assets[@]} == 0)); then
            echo "::error::No npm tarball artifacts found for release upload"
            exit 1
          fi

          if gh release view "$RELEASE_REF" >/dev/null 2>&1; then
            gh release edit "$RELEASE_REF" \
              --title "$RELEASE_REF" \
              --notes-file NOTES.md
            gh release upload "$RELEASE_REF" "${assets[@]}" --clobber
            exit 0
          fi

          extra_args=()
          if [[ "$RELEASE_REF" == *-* ]]; then
            extra_args+=(--prerelease)
          fi

          gh release create "$RELEASE_REF" \
            "${assets[@]}" \
            --title "$RELEASE_REF" \
            --notes-file NOTES.md \
            --verify-tag \
            "${extra_args[@]}"
