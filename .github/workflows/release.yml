name: Release

env:
  BUN_VERSION: "1.3.12"
  NPM_VERSION: "11.11.1"

on:
  push:
    branches: [main]
    paths: [VERSION]
  workflow_dispatch:
    inputs:
      publish_to_npm:
        description: Publish the current package versions to npm after verification
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('bun.lock', 'VERSION', 'package.json', 'packages/*/package.json') }}

      - name: Install dependencies
        env:
          npm_config_audit: "false"
          npm_config_fund: "false"
        run: npm install --include=optional --prefer-offline

      - name: Sync runtime package versions
        run: bun run sync:version

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Verify package tarballs
        run: node .github/tools/check-packlist.mjs

  publish:
    needs: verify
    if: github.event_name == 'push' || inputs.publish_to_npm == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/anonymize
          - packages/data
          - packages/anonymize/wasm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Install npm for trusted publishing
        run: npm install --global "npm@${{ env.NPM_VERSION }}"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('bun.lock', 'VERSION', 'package.json', 'packages/*/package.json') }}

      - name: Install dependencies
        env:
          npm_config_audit: "false"
          npm_config_fund: "false"
        run: npm install --include=optional --prefer-offline

      - name: Sync runtime package versions
        run: bun run sync:version

      - name: Build
        run: bun run build

      - name: Publish package
        if: github.event_name != 'push' || matrix.package != 'packages/data'
        working-directory: ${{ matrix.package }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION_JSON=/tmp/published-version.json
          PUBLISH_ERROR_LOG="$RUNNER_TEMP/npm-publish-error.log"

          version_is_published() {
            npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --json >"$PUBLISHED_VERSION_JSON" 2>/dev/null
          }

          if [[ -n "${NPM_TOKEN:-}" ]]; then
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
            unset NPM_CONFIG_USERCONFIG
          else
            unset NODE_AUTH_TOKEN
            export NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/.npmrc-trusted"
            printf '%s\n' \
              '@stll:registry=https://registry.npmjs.org' \
              >"$NPM_CONFIG_USERCONFIG"
          fi

          if version_is_published; then
            PUBLISHED_VERSION=$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" "$PUBLISHED_VERSION_JSON")
            if [[ "${PUBLISHED_VERSION}" == "${PACKAGE_VERSION}" ]]; then
              echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already published; skipping."
              exit 0
            fi
          fi

          if npm publish --provenance --access public 2>"$PUBLISH_ERROR_LOG"; then
            exit 0
          fi

          cat "$PUBLISH_ERROR_LOG" >&2

          for attempt in 1 2 3 4 5; do
            sleep "$attempt"
            if version_is_published; then
              PUBLISHED_VERSION=$(node -p "JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'))" "$PUBLISHED_VERSION_JSON")
              if [[ "${PUBLISHED_VERSION}" == "${PACKAGE_VERSION}" ]]; then
                echo "${PACKAGE_NAME}@${PACKAGE_VERSION} became visible after publish attempt; treating as success."
                exit 0
              fi
            fi
          done

          exit 1

  github-release:
    name: Create GitHub release
    needs: [verify, publish]
    if: needs.verify.result == 'success' && needs.publish.result == 'success' && (github.event_name == 'push' || inputs.publish_to_npm == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Read and validate VERSION
        id: version
        run: |
          if [[ ! -f VERSION ]]; then
            echo "::error::VERSION file is missing"
            exit 1
          fi

          version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(rc|beta|alpha)\.[0-9]+)?$ ]]; then
            echo "::error::VERSION must look like 1.2.3, 1.2.3-rc.1, 1.2.3-beta.1, or 1.2.3-alpha.1; got '$version'"
            exit 1
          fi

          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Create tag if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch --force --tags origin

          # /git/ref/{ref} is the exact-match endpoint. The plural
          # /git/refs/{ref} does prefix matching, so checking for
          # `v1.2.0` could also match `v1.2.0-rc.1`.
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Resolve release notes range
        id: release-notes-range
        env:
          RELEASE_REF: ${{ steps.version.outputs.tag }}
        run: |
          if [[ "$RELEASE_REF" == *-* ]]; then
            echo "args=--latest --strip header" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous_stable="$(
            git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
              --merged "$RELEASE_REF" \
              --sort=-v:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | grep -v -x "$RELEASE_REF" \
              | head -n 1
          )"

          if [[ -z "$previous_stable" ]]; then
            first_commit="$(git rev-list --max-parents=0 "$RELEASE_REF" | tail -n 1)"
            echo "args=--tag ${RELEASE_REF} --strip header ${first_commit}..${RELEASE_REF}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "args=--tag ${RELEASE_REF} --strip header ${previous_stable}..${RELEASE_REF}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from Conventional Commits
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: ${{ steps.release-notes-range.outputs.args }}
        env:
          OUTPUT: NOTES.md

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REF: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$RELEASE_REF" >/dev/null 2>&1; then
            gh release edit "$RELEASE_REF" \
              --title "$RELEASE_REF" \
              --notes-file NOTES.md
            exit 0
          fi

          extra_args=()
          if [[ "$RELEASE_REF" == *-* ]]; then
            extra_args+=(--prerelease)
          fi

          gh release create "$RELEASE_REF" \
            --title "$RELEASE_REF" \
            --notes-file NOTES.md \
            --verify-tag \
            "${extra_args[@]}"
