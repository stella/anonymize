name: Release

env:
  BUN_VERSION: "1.3.12"

on:
  workflow_dispatch:
    inputs:
      publish_to_npm:
        description: Publish the current package versions to npm after verification
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          scope: "@stll"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('bun.lock', 'package.json', 'packages/*/package.json') }}

      - name: Install dependencies
        env:
          npm_config_audit: "false"
          npm_config_fund: "false"
        run: npm install --include=optional --prefer-offline

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Verify package tarballs
        run: node .github/tools/check-packlist.mjs

  publish:
    needs: verify
    if: inputs.publish_to_npm == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/anonymize
          - packages/data
          - packages/anonymize/wasm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          scope: "@stll"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('bun.lock', 'package.json', 'packages/*/package.json') }}

      - name: Install dependencies
        env:
          npm_config_audit: "false"
          npm_config_fund: "false"
        run: npm install --include=optional --prefer-offline

      - name: Build
        run: bun run build

      - name: Publish package
        working-directory: ${{ matrix.package }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --json >/tmp/published-version.json 2>/dev/null; then
            PUBLISHED_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('/tmp/published-version.json','utf8'))")
            if [[ "${PUBLISHED_VERSION}" == "${PACKAGE_VERSION}" ]]; then
              echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already published; skipping."
              exit 0
            fi
          fi

          if [[ -n "${NPM_TOKEN:-}" ]]; then
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
          fi

          npm publish --provenance --access public
