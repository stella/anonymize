name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          scope: "@stll"

      - name: Verify Bun workflow pin
        run: node .github/tools/check-bun-workflows.mjs

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Turbo remote cache
        uses: rharkor/caching-for-turbo@5d14fba18e450c09393333cfd4242e8b3cb455a6 # v2.4.2

      - name: Install dependencies
        run: bun ci
        env:
          # .npmrc may reference NPM_TOKEN, but PR installs must not expose
          # the real npm token to dependency lifecycle scripts.
          NPM_TOKEN: ""

      - name: Check runtime package versions
        # Verify, do not mutate: a PR that bumps VERSION without bumping
        # the package versions (or vice versa) must fail CI, not be
        # silently patched in-job.
        run: bun run check:version

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Verify data mirror
        run: bun run --cwd packages/data check:mirror

      - name: Format
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Verify package tarballs
        run: node .github/tools/check-packlist.mjs

      - name: Smoke test built artifact
        run: bun run --cwd packages/anonymize smoke:dist

      - name: Contract performance (informational)
        # Surfaces pipeline-latency regressions against the thresholds in
        # contract-perf.mjs. Non-blocking for now (shared-runner timing is
        # noisy); promote to a hard gate once a stable baseline is set.
        continue-on-error: true
        run: bun run --cwd packages/anonymize perf:contracts
