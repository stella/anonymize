name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          scope: "@stll"

      - name: Verify Bun workflow pin
        run: node .github/tools/check-bun-workflows.mjs

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Turbo remote cache
        uses: rharkor/caching-for-turbo@5d14fba18e450c09393333cfd4242e8b3cb455a6 # v2.4.2

      - name: Install dependencies
        run: bun ci
        env:
          # .npmrc may reference NPM_TOKEN, but PR installs must not expose
          # the real npm token to dependency lifecycle scripts.
          NPM_TOKEN: ""

      - name: Sync runtime package versions
        run: bun run sync:version

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Verify data mirror
        run: bun run --cwd packages/data check:mirror

      - name: Format
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Verify package tarballs
        run: node .github/tools/check-packlist.mjs
