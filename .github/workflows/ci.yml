name: CI

env:
  UV_VERSION: "0.10.1"

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          scope: "@stll"

      - name: Verify Bun workflow pin
        run: node .github/tools/check-bun-workflows.mjs

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Turbo remote cache
        uses: rharkor/caching-for-turbo@5d14fba18e450c09393333cfd4242e8b3cb455a6 # v2.4.2

      - name: Install dependencies
        run: bun ci
        env:
          # .npmrc may reference NPM_TOKEN, but PR installs must not expose
          # the real npm token to dependency lifecycle scripts.
          NPM_TOKEN: ""

      - name: Setup Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal \
            --component rustfmt,clippy \
            --target wasm32-wasip1-threads
          rustup toolchain install nightly-2026-04-16 --profile minimal \
            --component rustc-dev \
            --component llvm-tools-preview
          rustup default 1.96.0
          cargo install cargo-dylint --version 6.0.1 --locked
          cargo install dylint-link --version 6.0.1 --locked

      - name: Rust checks
        run: bun run rust:check

      - name: Check runtime package versions
        # Verify, do not mutate: a PR that bumps VERSION without bumping
        # the package versions (or vice versa) must fail CI, not be
        # silently patched in-job.
        run: bun run check:version

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Verify data mirror
        run: bun run --cwd packages/data check:mirror

      - name: Format
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Install uv
        run: |
          python3 -m pip install --user "uv==${{ env.UV_VERSION }}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Python typecheck
        run: bun run python:typecheck

      - name: Python wheel
        run: bun run python:wheel

      - name: Test
        run: bun run test

      - name: Verify package tarballs
        run: node .github/tools/check-packlist.mjs

      - name: Smoke test built artifact
        run: bun run --cwd packages/anonymize smoke:dist

      - name: Smoke test wasm binding
        run: bun run --cwd packages/anonymize smoke:wasm

      - name: Smoke test wasm package entry
        run: bun run --cwd packages/anonymize smoke:wasm-package

      - name: Migration fixture parity and performance
        run: |
          git fetch origin main --depth=1
          bun run --cwd packages/anonymize perf:migration-fixtures

      - name: Native fixture parity and performance
        env:
          ANONYMIZE_MIGRATION_ALLOW_ACCEPTED_MISMATCHES: "1"
          ANONYMIZE_MIGRATION_CANDIDATE_RUNTIME: native-static
          ANONYMIZE_MIGRATION_FAIL_ON_MISMATCH: "1"
          ANONYMIZE_MIGRATION_NATIVE_COMPRESSED_PACKAGE: "1"
          ANONYMIZE_MIGRATION_NATIVE_PREPARED_PACKAGE: "1"
          ANONYMIZE_MIGRATION_REQUIRE_NATIVE_PIPELINE: "1"
        run: |
          git fetch origin main --depth=1
          bun run --cwd packages/anonymize perf:migration-fixtures

      - name: Contract performance (informational)
        # Surfaces pipeline-latency regressions against the thresholds in
        # contract-perf.mjs. Non-blocking for now (shared-runner timing is
        # noisy); promote to a hard gate once a stable baseline is set.
        continue-on-error: true
        run: bun run --cwd packages/anonymize perf:contracts

      - name: Native adapter performance (informational)
        # Emits aggregate TS/NAPI and Python/PyO3 timings for the shared
        # Rust-backed static adapter contract.
        continue-on-error: true
        run: bun run --cwd packages/anonymize perf:native-adapters

      - name: Native default SDK performance (informational)
        # Emits fixture-level default package timings for TS and Python SDKs,
        # with hashed output parity checked before summaries are printed.
        continue-on-error: true
        run: bun run --cwd packages/anonymize perf:native-default
