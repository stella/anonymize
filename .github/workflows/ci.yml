name: CI

env:
  UV_VERSION: "0.10.1"

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changeset:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Require a changeset for runtime source changes
        run: bun run changeset:check
        env:
          CHANGESET_HEAD_REF: ${{ github.head_ref }}
          CHANGESET_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          CHANGESET_PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          CHANGESET_REPOSITORY: ${{ github.repository }}

  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          scope: "@stll"

      - name: Verify Bun workflow pin
        run: node .github/tools/check-bun-workflows.mjs

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: "package.json"

      - name: Turbo remote cache
        uses: rharkor/caching-for-turbo@75f8ebf4a43d2c60b23bc2a27082cfea94ffdad9 # v2.5.0

      - name: Install dependencies
        run: bun ci
        env:
          # .npmrc may reference NPM_TOKEN, but PR installs must not expose
          # the real npm token to dependency lifecycle scripts.
          NPM_TOKEN: ""

      - name: Check bun.lock workspace-version drift
        # A frozen-lockfile install never validates a workspace's cached
        # "version" in bun.lock against its own package.json, so a stale
        # entry (see scripts/check-lockfile-workspace-versions.ts) can
        # silently persist and ship a wrong `workspace:*`/`workspace:^`
        # range at pack time.
        run: bun run scripts/check-lockfile-workspace-versions.ts

      - name: Setup Rust
        run: |
          rustup toolchain install 1.96.0 --profile minimal \
            --component rustfmt,clippy \
            --target wasm32-wasip1-threads
          rustup toolchain install nightly-2026-04-16 --profile minimal \
            --component rustc-dev \
            --component llvm-tools-preview
          rustup default 1.96.0
          cargo install cargo-dylint --version 6.0.1 --locked
          cargo install dylint-link --version 6.0.1 --locked

      - name: Install pinned Rust CI tools (checksum-verified)
        # Prebuilt nextest (the `cargo ci-test` runner), cargo-deny (the
        # supply-chain gate, `cargo ci-deny`), and cargo-insta (the
        # snapshot-hygiene gate, `cargo ci-snapshot`); avoids a from-source
        # compile on every CI run. taiki-e/install-action verifies release
        # checksums, unlike a raw `curl | tar`. Version-pinned for
        # reproducibility, matching the exact-version pins above.
        uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: nextest@0.9.140,cargo-deny@0.20.2,cargo-insta@1.48.0

      # Cache the compiled dependency graph across runs. Without this the whole
      # Rust workspace (and its heavy deps) recompiled from scratch every run;
      # caching also amortizes the optimized `ci` test profile so the faster
      # test execution is a net win, not just a compile-time trade. Keyed on the
      # lockfile plus the pinned toolchain, so a dependency or Rust bump
      # invalidates the cache.
      - name: Cache Rust build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-1.96.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-1.96.0-

      - name: Rust checks
        run: bun run rust:check

      - name: Cargo deny (supply chain)
        # Full-tree license/advisory/source/duplicate checks; complements the
        # PR-scoped dependency-review action. See deny.toml.
        run: bun run rust:deny

      - name: Snapshot hygiene (insta)
        # Rejects snapshot mismatches and orphaned .snap files no test
        # references anymore. Reuses the cached `ci` profile build.
        run: bun run rust:snapshot-check

      - name: Fuzz targets compile (anti-bitrot)
        # The fuzz crate is its own workspace, so it is not covered by the
        # `--workspace` build above and can silently stop compiling when the
        # core public API changes. A compile-check (no nightly / cargo-fuzz /
        # sanitizer needed) keeps the targets honest; actual fuzzing runs
        # locally or on demand (see fuzz/README.md).
        run: cargo check --manifest-path fuzz/Cargo.toml --bins

      - name: Check runtime package versions
        # Verify, do not mutate: a PR that bumps VERSION without bumping
        # the package versions (or vice versa) must fail CI, not be
        # silently patched in-job.
        run: bun run check:version

      - name: Build
        run: bun run build

      - name: Package exports (publint + attw)
        # Validates the published @stll/anonymize package.json exports and that
        # its types resolve for real consumers. Runs after the build so dist/
        # exists.
        run: bun run check:exports

      - name: Lint
        run: bun run lint

      - name: Verify data mirror
        run: bun run --cwd packages/data check:mirror

      - name: Format
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Knip (unused/undeclared deps)
        # High-signal only: undeclared (`unlisted`) and unresolved imports. The
        # unused-file/export/dependency rules are off — this polyglot monorepo
        # (native bindings, wasm, .mjs scripts, uv tooling) trips too many false
        # positives on them to gate. See knip.json.
        run: bun run check:knip

      - name: Install uv
        run: |
          python3 -m pip install --user "uv==${{ env.UV_VERSION }}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Python typecheck
        run: bun run python:typecheck

      - name: Python wheel
        run: bun run python:wheel

      - name: Test
        run: bun run test

      - name: Verify package tarballs
        run: node .github/tools/check-packlist.mjs

      - name: Smoke test built artifact
        run: bun run --cwd packages/anonymize smoke:dist

      - name: Smoke test wasm binding
        run: bun run --cwd packages/anonymize smoke:wasm

      - name: Smoke test wasm package entry
        run: bun run --cwd packages/anonymize smoke:wasm-package

      - name: Smoke test wasm browser path
        # Exercises the browser glue, its Worker, and the SharedArrayBuffer
        # (cross-origin isolated) path that the Node-WASI smokes never touch.
        # Uses the system Chrome preinstalled on ubuntu runners via puppeteer-core
        # (no browser download). The smoke serves COOP/COEP headers itself, so no
        # extra Chrome feature flags are required.
        env:
          CHROME_BIN: /usr/bin/google-chrome-stable
        run: bun run --cwd packages/anonymize smoke:wasm-browser

      - name: Native fixture parity
        # Drives the Rust crates/anonymize-py extension in a subprocess and
        # asserts its default-package redaction is byte-for-byte identical to
        # the in-process native binding across the cs/de/en contract fixtures.
        # This is the go-forward parity gate: the legacy TypeScript pipeline
        # (and its origin/main migration baseline) has been removed.
        run: bun run --cwd packages/anonymize test:native-fixtures

      - name: Native adapter performance (informational)
        # Emits aggregate TS/NAPI and Python/PyO3 timings for the shared
        # Rust-backed static adapter contract.
        continue-on-error: true
        run: bun run --cwd packages/anonymize perf:native-adapters

      - name: Native default SDK performance (informational)
        # Emits fixture-level default package timings for TS and Python SDKs,
        # with hashed output parity checked before summaries are printed.
        continue-on-error: true
        run: bun run --cwd packages/anonymize perf:native-default
