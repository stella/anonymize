# Opt-in pre-commit hooks.
# To activate: bun run hooks:install
# To deactivate: bun run hooks:uninstall
#
# These hooks are NOT auto-installed. Each developer
# chooses whether to use them.

no_auto_install: true

pre-commit:
  parallel: false
  commands:
    secrets:
      run: bun run secrets:check:staged
    ai-skills:
      glob: "{.agents/skills,.ai/local-skills,.ai/shared/skills,.claude/commands}/**"
      run: bash scripts/check-ai-skill-sources.sh
    # `stage_fixed: true` will `git add` the whole file after
    # formatting, which pulls any unstaged hunks into the
    # commit. Accepted trade-off — partial-hunk commits across
    # files the formatter touches are rare, and the alternative
    # (failing the hook) blocks the common case.
    format:
      run: bun --bun oxfmt --no-error-on-unmatched-pattern {staged_files} "!.ai/**" "!.agents/**" "!.claude/**" "!AGENTS.md" "!CLAUDE.md" "!GEMINI.md"
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: bun --filter @stll/anonymize typecheck
    typecheck-data:
      run: bun --filter @stll/anonymize-data typecheck
    format:
      run: bun run format:check
    ai-skills:
      run: bash scripts/check-ai-skill-sources.sh
    # Tests intentionally not run here: the full @stll/anonymize suite
    # takes ~7 minutes, which exceeds the pre-push budget. Swap to a
    # `test:fast` script once one exists, e.g.:
    #   test:
    #     run: bun --filter @stll/anonymize run test:fast
    # CI runs the full test suite on every PR.
