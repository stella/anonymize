# Opt-in pre-commit hooks.
# To activate: bun run hooks:install
# To deactivate: bun run hooks:uninstall
#
# These hooks are NOT auto-installed. Each developer
# chooses whether to use them.

no_auto_install: true

pre-commit:
  parallel: false
  commands:
    format:
      run: bunx prettier --write --ignore-unknown --ignore-path .prettierignore --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    json-data:
      glob:
        - "packages/data/config/*.json"
        - "packages/data/config/**/*.json"
        - "packages/data/dictionaries/**/*.json"
      run: bunx prettier --check {staged_files}

pre-push:
  parallel: true
  commands:
    typecheck:
      run: bun --filter @stll/anonymize typecheck
    typecheck-data:
      run: bun --filter @stll/anonymize-data typecheck
    format:
      run: bun run format:check
    # Tests intentionally not run here: the full @stll/anonymize suite
    # takes ~7 minutes, which exceeds the pre-push budget. Swap to a
    # `test:fast` script once one exists, e.g.:
    #   test:
    #     run: bun --filter @stll/anonymize run test:fast
    # CI runs the full test suite on every PR.
