[package]
name = "stella-anonymize-core"
version.workspace = true
edition.workspace = true
description = "Core anonymization semantics"
license.workspace = true
publish.workspace = true
repository.workspace = true
keywords = ["anonymization", "pii", "redaction", "text"]
