[package]
name = "stella-anonymize-core"
version.workspace = true
edition.workspace = true
description = "Core anonymization semantics"
license.workspace = true
publish.workspace = true
repository.workspace = true
keywords = ["anonymization", "pii", "redaction", "text"]
categories = ["text-processing"]

[dependencies]
bon = "3.9.3"
fancy-regex = "0.18"
regex = "1"
serde = { version = "1", features = ["derive"] }
smallvec = { version = "1.15.2", features = [
  "serde",
  "const_generics",
  "union",
] }
stella-stdnum-core = { version = "2.1.1", git = "https://github.com/stella/stdnum", rev = "2f3c3f107e3976ac059cc438d77916a592595d59" }
stella-text-search-core = { version = "1.0.6", git = "https://github.com/stella/text-search", rev = "654d9b13af3a3db7a01923935234d8054dfd74ce" }

[dev-dependencies]
proptest = "1"

[lints]
workspace = true
